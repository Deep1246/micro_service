spring:
  cloud:
    gateway:
      routes:
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/orders/**
            - Method=GET,POST,PUT,DELETE
        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/api/v1/products/**
            - Method=GET,POST,PUT,DELETE


  application:
    name: api-gateway



eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka


server:
  port: 8081


