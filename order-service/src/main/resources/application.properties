spring.application.name=order-service

spring.config.import=configserver:http://localhost:8888

eureka.instance.prefer-ip-address=true



server.servlet.context-path=/order-service
resilience4j.retry.instances.findInventoriesFallBack.max-attempts=3
resilience4j.retry.instances.findInventoriesFallBack.wait-duration=1s
resilience4j.retry.instances.findInventoriesFallBack.enable-exponential-backoff=true
resilience4j.retry.instances.findInventoriesFallBack.exponential-backoff-multiplier=2


resilience4j.circuitbreaker.instances.findInventoriesFallBack.sliding-window-size=10
resilience4j.circuitbreaker.instances.findInventoriesFallBack.minimum-number-of-calls=4
resilience4j.circuitbreaker.instances.findInventoriesFallBack.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.findInventoriesFallBack.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.findInventoriesFallBack.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.findInventoriesFallBack.automatic-transition-from-open-to-half-open-enabled=true



