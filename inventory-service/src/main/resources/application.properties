spring.application.name=inventory-service

spring.config.import=configserver:http://localhost:8888


eureka.instance.prefer-ip-addres=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

resilience4j.retry.instances.findProductById.max-attempts=3
resilience4j.retry.instances.findProductById.wait-duration=2s
resilience4j.retry.instances.findProductById.enable-exponential-backoff=true
resilience4j.retry.instances.findProductById.exponential-backoff-multiplier=2

